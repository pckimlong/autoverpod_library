name: Publish autoverpod to pub.dev

on:
  release:
    types: [published]
  workflow_call:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'autoverpod-v') }}
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for pub.dev publishing
      contents: read
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
    
    - name: Install dependencies
      run: flutter pub get
      working-directory: autoverpod
    
    - name: Publish to pub.dev
      run: flutter pub publish --force
      working-directory: autoverpod

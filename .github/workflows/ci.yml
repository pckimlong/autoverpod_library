name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dart-packages:
    name: Dart packages (format, test, example)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies (autoverpod_annotation)
        run: flutter pub get
        working-directory: autoverpod_annotation

      - name: Install dependencies (autoverpod_generator)
        run: flutter pub get
        working-directory: autoverpod_generator

      - name: Install dependencies (example)
        run: flutter pub get
        working-directory: example

      - name: Analyze example (pre-generation)
        run: flutter analyze
        working-directory: example

      - name: Test autoverpod_generator
        run: dart test
        working-directory: autoverpod_generator

      - name: Clean lean_builder generated files (example)
        run: |
          find lib -type f -name "*.widget.dart" -delete
        working-directory: example

      - name: Generate example code (lean_builder)
        run: dart run lean_builder build
        working-directory: example

      - name: Analyze example (after lean_builder generation)
        run: flutter analyze
        working-directory: example

      - name: Clean build_runner generated files (example)
        run: |
          find lib -type f \( -name "*.g.dart" -o -name "*.freezed.dart" \) -delete
        working-directory: example

      - name: Generate example code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: example

      - name: Analyze example (after build_runner generation)
        run: flutter analyze
        working-directory: example

      - name: Verify example generated files are committed
        run: git diff --exit-code -- example/lib

      - name: Format code
        run: dart format autoverpod autoverpod_annotation autoverpod_generator example

      - name: Format check
        run: dart format --output=none --set-exit-if-changed autoverpod autoverpod_annotation autoverpod_generator example

  flutter-package:
    name: Flutter package tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: autoverpod

      - name: Flutter tests
        run: flutter test
        working-directory: autoverpod

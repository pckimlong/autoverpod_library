name: Publish autoverpod_generator to pub.dev

on:
  push:
    tags:
      - 'autoverpod_generator-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Wait for required autoverpod_annotation version on pub.dev
        run: |
          REQUIRED_VERSION=$(ruby -e 'require "yaml"; dep = YAML.load_file("autoverpod_generator/pubspec.yaml").dig("dependencies", "autoverpod_annotation"); puts dep.to_s.sub(/^\^/, "")')
          URL="https://pub.dev/api/packages/autoverpod_annotation/versions/${REQUIRED_VERSION}"

          for attempt in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$code" = "200" ]; then
              echo "autoverpod_annotation $REQUIRED_VERSION is available on pub.dev"
              exit 0
            fi

            echo "Attempt $attempt: autoverpod_annotation $REQUIRED_VERSION is not available yet (HTTP $code)"
            sleep 20
          done

          echo "Timed out waiting for autoverpod_annotation $REQUIRED_VERSION to appear on pub.dev"
          exit 1

      - name: Install dependencies
        run: flutter pub get
        working-directory: autoverpod_generator

      - name: Publish to pub.dev
        run: dart pub publish --force
        working-directory: autoverpod_generator

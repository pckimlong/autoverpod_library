name: Create Release

on:
  push:
    branches: [ main ]
    paths:
      - 'autoverpod/**'
      - 'autoverpod_annotation/**'
      - 'autoverpod_generator/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: autoverpod_annotation
            package_path: autoverpod_annotation
            publish_cmd: dart pub publish --dry-run
            test_cmd: dart --version
          - package_name: autoverpod
            package_path: autoverpod
            publish_cmd: flutter pub publish --dry-run
            test_cmd: flutter test
          - package_name: autoverpod_generator
            package_path: autoverpod_generator
            publish_cmd: dart pub publish --dry-run
            test_cmd: dart test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Require release tag token
        env:
          RELEASE_TAG_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN }}
        run: |
          if [ -z "$RELEASE_TAG_TOKEN" ]; then
            echo "Missing repository secret RELEASE_TAG_TOKEN."
            echo "Use a PAT or GitHub App token to push release tags so publish workflows can trigger."
            exit 1
          fi

      - name: Detect package changes in this push
        id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            DIFF_RANGE="$CURRENT_SHA^..$CURRENT_SHA"
          else
            DIFF_RANGE="$BEFORE_SHA..$CURRENT_SHA"
          fi

          echo "Comparing changed files in $DIFF_RANGE"

          if git diff --name-only "$DIFF_RANGE" -- "${{ matrix.package_path }}" | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Package changes detected in ${{ matrix.package_path }}/"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No package changes detected in ${{ matrix.package_path }}/"
          fi

      - name: Extract version from package pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' "${{ matrix.package_path }}/pubspec.yaml" | sed 's/version: //')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${{ matrix.package_name }}-v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version for ${{ matrix.package_name }}: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} does not exist"
          fi

      - name: Require version bump when package changed
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'true'
        run: |
          echo "Package changes were detected in ${{ matrix.package_path }}/, but version ${{ steps.version.outputs.version }} is already tagged as ${{ steps.version.outputs.tag }}."
          echo "Bump ${{ matrix.package_path }}/pubspec.yaml and add a matching CHANGELOG entry before merging to main."
          exit 1

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        run: flutter pub get
        working-directory: ${{ matrix.package_path }}

      - name: Validate package before release
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          ${{ matrix.test_cmd }}
          ${{ matrix.publish_cmd }}
        working-directory: ${{ matrix.package_path }}

      - name: Extract release notes from package changelog
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## " ver "([[:space:]-]|$)" {
              found=1
              next
            }
            /^## / && found {
              exit
            }
            found {
              print
            }
          ' "${{ matrix.package_path }}/CHANGELOG.md")

          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ matrix.package_name }} version $VERSION"
          fi

          echo "$NOTES" > release_notes.txt
          echo "Release notes extracted"

      - name: Create Git Tag
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        env:
          RELEASE_TAG_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_TAG_TOKEN}@github.com/${{ github.repository }}.git"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.changes.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ matrix.package_name }} ${{ steps.version.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release
        if: steps.changes.outputs.changed == 'false'
        run: echo "Skipping release - no package changes detected for ${{ matrix.package_name }}"
